name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[eval,train,docs]" pytest

      - name: Run tests
        run: pytest tests

      - name: Compile Python files
        run: python -m compileall syncorsink examples tests

      - name: Validate generated leaderboard
        run: |
          python examples/validate_leaderboard.py \
            --results results/syncorsink_v0_1 \
            --benchmark benchmarks/syncorsink_v0_1.json \
            --md docs/leaderboard_results.md \
            --csv docs/leaderboard_results.csv \
            --json docs/leaderboard_results.json

      - name: Ensure generated files are committed
        run: git diff --exit-code docs/leaderboard_results.md docs/leaderboard_results.csv docs/leaderboard_results.json

      - name: Build docs
        run: mkdocs build --strict
